<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>设备轨迹 · 赵雨轩</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="manifest" href="manifest.json" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body, html, #map { height:100%; width:100%; }
    .info-card {
      position: fixed; bottom:20px; left:15px; right:15px;
      background: rgba(255,255,255,0.95); backdrop-filter: blur(10px);
      border-radius:16px; padding:12px 15px; z-index:1000;
      box-shadow:0 4px 20px rgba(0,0,0,0.15);
      display:flex; align-items:center; gap:12px;
    }
    .avatar {
      width:48px; height:48px; border-radius:50%; background:#3b82f6;
      color:#fff; display:flex; align-items:center; justify-content:center;
      font-size:20px; font-weight:bold; flex-shrink:0;
    }
    .info-text h3 { font-size:16px; margin-bottom:2px; }
    .info-text p { font-size:13px; color:#475569; }
  </style>
</head>
<body>
  <div id="map"></div>
  <div class="info-card">
    <div class="avatar">赵</div>
    <div class="info-text">
      <h3>赵雨轩</h3>
      <p>📍 家：学院西路2009号沧州交通学院</p>
      <p id="statusText">📡 连接中...</p>
    </div>
  </div>

  <script>
    // ********** 修改为你的 Render 域名 **********
    const BACKEND_URL = 'wss://esp-gps-tracker.onrender.com';
    // ******************************************

    const DEVICE_ID = 'device1';
    const HOME_POS = [38.38, 117.33];   // 沧州交通学院坐标

    // 地图初始化
    const map = L.map('map', { center: HOME_POS, zoom: 16, zoomControl: false });
    L.control.zoom({ position: 'topright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap',
      maxZoom: 19
    }).addTo(map);

    // 家标记
    L.marker(HOME_POS).addTo(map).bindPopup('🏡 家');

    // 设备图标
    const deviceIcon = L.divIcon({
      html: '<div style="width:18px;height:18px;background:#f97316;border:3px solid white;border-radius:50%;box-shadow:0 0 8px rgba(249,115,22,0.6);"></div>',
      iconSize: [18,18], iconAnchor: [9,9]
    });

    let deviceMarker = null;
    let trackPoints = [HOME_POS];        // 轨迹起点是家
    const trackLine = L.polyline(trackPoints, {
      color: '#f97316', weight: 4, opacity: 0.8
    }).addTo(map);

    // 更新状态文字
    const statusEl = document.getElementById('statusText');

    // WebSocket 连接
    let ws;
    function connectWebSocket() {
      ws = new WebSocket(BACKEND_URL);

      ws.onopen = () => {
        statusEl.textContent = '📡 已连接，等待设备上传...';
      };

      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.type === 'new_point' && data.deviceId === DEVICE_ID) {
            const { lat, lng } = data.point;
            const newPoint = [lat, lng];

            // 过滤静止漂移：移动不足 1 米不记录
            const last = trackPoints[trackPoints.length - 1];
            const dist = map.distance(last, newPoint);
            if (dist >= 1) {
              trackPoints.push(newPoint);
              trackLine.setLatLngs(trackPoints);

              if (!deviceMarker) {
                deviceMarker = L.marker(newPoint, { icon: deviceIcon }).addTo(map);
              } else {
                deviceMarker.setLatLng(newPoint);
              }

              statusEl.textContent = `📡 实时跟踪中... (${trackPoints.length - 1} 个轨迹点)`;
            }
          }
        } catch (e) { /* 忽略解析错误 */ }
      };

      ws.onclose = () => {
        statusEl.textContent = '📡 连接断开，5秒后重连...';
        setTimeout(connectWebSocket, 5000);
      };

      ws.onerror = () => ws.close();
    }

    // 页面加载时获取历史轨迹（如果服务器有保存）
    async function loadHistory() {
      try {
        const httpUrl = BACKEND_URL.replace('wss://', 'https://');
        const res = await fetch(`${httpUrl}/api/trajectory/${DEVICE_ID}`);
        const data = await res.json();
        if (data.points && data.points.length > 0) {
          // 将历史点全部加入，起点仍为家
          trackPoints = [HOME_POS, ...data.points.map(p => [p.lat, p.lng])];
          trackLine.setLatLngs(trackPoints);
          const last = trackPoints[trackPoints.length - 1];
          if (!deviceMarker) {
            deviceMarker = L.marker(last, { icon: deviceIcon }).addTo(map);
          } else {
            deviceMarker.setLatLng(last);
          }
          statusEl.textContent = `📡 已加载 ${data.points.length} 个历史点`;
        }
      } catch (e) { /* 历史加载失败不影响使用 */ }
    }

    // 启动
    loadHistory();
    connectWebSocket();

    // 每 14 分钟发一个 HTTP 请求，防止 Render 休眠
    const heartbeatUrl = BACKEND_URL.replace('wss://', 'https://') + '/api/trajectory/' + DEVICE_ID;
    setInterval(() => {
      fetch(heartbeatUrl).catch(() => {});
    }, 14 * 60 * 1000);
  </script>
</body>
</html>
